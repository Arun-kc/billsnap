<svg width="44" height="44" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="BillSnap icon">
  <defs>
    <linearGradient id="bill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7340BE"/>
      <stop offset="100%" stop-color="#2A1450"/>
    </linearGradient>
    <linearGradient id="fold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8BF45"/>
      <stop offset="100%" stop-color="#A07A1A"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5DC87"/>
      <stop offset="100%" stop-color="#C9A227"/>
    </linearGradient>
  </defs>

  <!-- Tilted bill -->
  <g transform="rotate(-8 22 22)">
    <!-- Drop shadow -->
    <path d="M10 10 C10 8.9 10.9 8 12 8H26L34 16V37 C34 38.1 33.1 39 32 39H12 C10.9 39 10 38.1 10 37Z"
          fill="#0E0520" opacity="0.3" transform="translate(2 2)"/>
    <!-- Bill body -->
    <path d="M10 10 C10 8.9 10.9 8 12 8H26L34 16V37 C34 38.1 33.1 39 32 39H12 C10.9 39 10 38.1 10 37Z"
          fill="url(#bill)"/>
    <!-- Folded corner -->
    <path d="M26 8L34 16H28 C26.9 16 26 15.1 26 14Z" fill="url(#fold)"/>
    <!-- Ruled lines -->
    <line x1="14" y1="22" x2="28" y2="22" stroke="rgba(255,255,255,0.22)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="14" y1="27" x2="26" y2="27" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Lightning bolt — top-right, upright -->
  <path d="M30,6 L21,20 L27,20 L24,32 L35,17 L29,17 Z" fill="url(#bolt)"/>
</svg>
