[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Railway sets $PORT automatically — use it instead of hardcoding 8000.
startCommand = "echo \"=== PORT=${PORT} ===\"  && uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000} --log-level debug"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
