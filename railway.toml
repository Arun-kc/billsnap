[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Minimal diagnostic: no alembic, no healthcheck — just start uvicorn and see if it stays up
startCommand = "echo \"=== PORT=${PORT} ===\"  && uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000} --log-level debug"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
