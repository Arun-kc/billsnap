[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Railway sets $PORT automatically — use it instead of hardcoding 8000.
startCommand = "alembic upgrade head && echo \"=== STARTING UVICORN ON PORT=${PORT} ===\" && uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000} --log-level debug 2>&1"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
